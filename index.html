<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Louissxe</title>
    <script src="tailwind.js"></script>
    <script src="lucide.js"></script>

    <style>
      @import url("inter.css");
    </style>
    <style>
      :root {
        --ios-blur: 30px;
        --ios-glass: rgba(20, 20, 25, 0.4);
        --ios-border: rgba(255, 255, 255, 0.08);
      }

      body {
        font-family: "Inter", sans-serif;
        background: #000;
        color: #fff;
        margin: 0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .orb {
        position: fixed;
        filter: blur(120px);
        border-radius: 50%;
        z-index: -1;
        opacity: 0.25;
        animation: floating 25s infinite alternate ease-in-out;
      }
      @keyframes floating {
        0% {
          transform: translate(-10%, -10%) scale(1);
        }
        100% {
          transform: translate(10%, 10%) scale(1.3);
        }
      }

      .glass-panel {
        background: var(--ios-glass);
        backdrop-filter: blur(var(--ios-blur)) saturate(180%);
        -webkit-backdrop-filter: blur(var(--ios-blur)) saturate(180%);
        border: 1px solid var(--ios-border);
        box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
      }

      .squircle {
        border-radius: 2.8rem;
      }

      .shimmer {
        position: relative;
        overflow: hidden;
      }
      .shimmer::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          45deg,
          transparent 45%,
          rgba(255, 255, 255, 0.02) 50%,
          transparent 55%
        );
        animation: shimmer-anim 8s infinite;
      }
      @keyframes shimmer-anim {
        0% {
          transform: translateX(-100%) translateY(-100%);
        }
        100% {
          transform: translateX(100%) translateY(100%);
        }
      }

      .dock {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: fit-content;
        padding: 8px 16px;
        display: flex;
        gap: 8px;
        z-index: 100;
      }

      .dock-item {
        position: relative;
        transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
      }
      .dock-item:hover {
        transform: scale(1.2) translateY(-8px);
      }
      .dock-item:active {
        transform: scale(0.9);
      }
      .dock-glow {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.15) 0%,
          transparent 70%
        );
        opacity: 0;
        transition: all 0.4s;
        filter: blur(10px);
        z-index: -1;
      }
      .dock-item:hover .dock-glow {
        opacity: 1;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@^19.2.4",
          "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
          "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
          "react/": "https://esm.sh/react@^19.2.4/",
          "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
      
    <div
      class="orb w-[600px] h-[600px] bg-blue-900 top-[-200px] left-[-200px]"
    ></div>
    <div
      class="orb w-[500px] h-[500px] bg-indigo-900 bottom-[-100px] right-[-100px]"
      style="animation-delay: -7s"
    ></div>

    <main class="max-w-[420px] mx-auto pt-24 pb-48 px-6">
      <header class="text-center mb-14">
        <div class="relative inline-block mb-8">
          <div
            class="absolute inset-0 bg-blue-500/10 blur-[80px] rounded-full scale-150"
          ></div>
          <img
            id="avatar"
            src="louissxe.jpg"
            class="relative w-28 h-28 squircle border border-white/10 shadow-2xl mx-auto object-cover"
            alt="Profile"
          />
        </div>
        <h1
          id="profile-name"
          class="text-3xl font-bold tracking-tight mb-2 text-white/95"
        >
          Louis Syahputra
        </h1>
        <p
          id="profile-handle"
          class="text-white/40 text-[10px] font-bold tracking-[0.4em] uppercase"
        >
          @louissxe.ux
        </p>
      </header>

      <section id="links-container" class="space-y-3.5">
      </section>

      <footer class="text-center opacity-10 mt-24">
        <p class="text-[8px] tracking-[0.6em] uppercase font-black">
          Hello World
        </p>
      </footer>
    </main>

    <nav class="dock glass-panel rounded-full">
      <div class="dock-item">
        <div class="dock-glow"></div>
        <a href="https://discord.gg/example" target="_blank" class="p-3.5 block"
          ><i data-lucide="message-circle" class="w-5 h-5 text-white/40"></i
        ></a>
      </div>
      <div class="dock-item">
        <div class="dock-glow"></div>
        <a href="https://example.com/server" target="_blank" class="p-3.5 block"
          ><i data-lucide="server" class="w-5 h-5 text-white/40"></i
        ></a>
      </div>
      <div class="dock-item">
        <div class="dock-glow"></div>
        <a href="https://example.com/music" target="_blank" class="p-3.5 block"
          ><i data-lucide="music" class="w-5 h-5 text-white/40"></i
        ></a>
      </div>
      <div class="dock-item">
        <div class="dock-glow"></div>
        <a
          href="https://github.com"
          target="_blank"
          class="p-3.5 block"
          ><i data-lucide="github" class="w-5 h-5 text-white/40"></i
        ></a>
      </div>
    </nav>

    <script type="module" src="index.js"></script>
  </body>
</html>
